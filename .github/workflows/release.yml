name: release

# Build the portable one-dir bundle on every OS and publish a GitHub Release
# whenever a vX.Y.Z tag is pushed. The bundle ships its own Python — users
# download, extract, and run the launcher with no toolchain installed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ccbalancer-linux-x86_64
            bin: dist/ccbalancer/ccbalancer
          - os: windows-latest
            asset: ccbalancer-windows-x86_64
            bin: dist/ccbalancer/ccbalancer.exe
          - os: macos-latest
            asset: ccbalancer-macos-arm64
            bin: dist/ccbalancer/ccbalancer
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package + packaging extras
        run: python -m pip install -e ".[packaging]"

      - name: Read version
        id: version
        run: |
          version=$(python -c "import ccbalancer; print(ccbalancer.__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ccbalancer version: $version"

      - name: Build one-dir bundle
        run: pyinstaller packaging/ccbalancer.spec

      - name: Smoke-test bundle
        run: |
          "${{ matrix.bin }}" version
          "${{ matrix.bin }}" --help
          "${{ matrix.bin }}" pair --help
          "${{ matrix.bin }}" analyze --help

      - name: Zip bundle
        run: python -c "import shutil; shutil.make_archive('${{ matrix.asset }}', 'zip', 'dist', 'ccbalancer')"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
          generate_release_notes: true
